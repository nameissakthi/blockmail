spring.application.name=server

# Server Configuration
server.port=${SERVER_PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}

# Database Configuration
spring.jpa.database=PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:blockmail}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.jpa.show-sql=true

# Email Configuration (Gmail SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT Security
spring.security.jwt.secret-key=${JWT_SECRET:4e6118d687bcf565a2677a4bd7cb5c6de8c09bbaec72a9e49d25ef4894cd8be6f3a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0}
spring.security.jwt.expiration-ms=86400000

# QKD Key Manager Configuration (ETSI GS QKD 014)
qkd.keymanager.base-url=http://localhost:8080/api/v1/keys
qkd.keymanager.master-km-id=KM_001
qkd.keymanager.default-key-size=256
qkd.keymanager.key-pool-size=10
qkd.keymanager.key-lifetime-seconds=3600
qkd.keymanager.mock-mode=true
qkd.keymanager.auth-token=

# Enable scheduling for key lifecycle management
spring.task.scheduling.enabled=true

# CORS Configuration - Allow multiple frontend origins
# For Electron desktop app, use file:// protocol and localhost for development
client.urls=file://,http://localhost:5173,http://localhost:5174,http://localhost:3000,http://localhost:5175

# Actuator Configuration for Docker Health Checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true

# Blockchain Configuration (Ganache/Ethereum)
blockchain.enabled=${BLOCKCHAIN_ENABLED:false}
blockchain.network=${BLOCKCHAIN_NETWORK:ganache}
blockchain.rpc.url=${BLOCKCHAIN_RPC_URL:http://127.0.0.1:7545}
blockchain.chain.id=${BLOCKCHAIN_CHAIN_ID:1337}
blockchain.contract.address=${BLOCKCHAIN_CONTRACT_ADDRESS:}
blockchain.gas.limit=${BLOCKCHAIN_GAS_LIMIT:6721975}
blockchain.gas.price=${BLOCKCHAIN_GAS_PRICE:20000000000}

