version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: bitnami/postgresql:latest
    container_name: quantum-mail-postgres
    restart: unless-stopped
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=sakthivel
      - POSTGRESQL_DATABASE=blockmail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/bitnami/postgresql
    networks:
      - quantum-mail-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ganache Blockchain (Local Ethereum Network)
  ganache:
    image: trufflesuite/ganache:v7.9.1
    container_name: quantum-mail-ganache
    restart: unless-stopped
    ports:
      - "7545:8545"
      - "8545:8545"
    command: >
      --wallet.mnemonic "test test test test test test test test test test test junk"
      --chain.chainId 1337
      --server.host 0.0.0.0
      --server.port 8545
      --database.dbPath /ganache-data
      --wallet.defaultBalance 100
      --miner.blockGasLimit 12000000
      --chain.allowUnlimitedContractSize true
    volumes:
      - ganache_data:/ganache-data
    networks:
      - quantum-mail-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8545 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Quantum Mail Backend Application with Blockchain Integration
  quantum-mail-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: sakthiveldk/quantum-mail-server:v1
    container_name: quantum-mail-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database Configuration
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=blockmail
      - DB_USERNAME=postgres
      - DB_PASSWORD=sakthivel

      # Server Configuration
      - SERVER_PORT=8080

      # JWT Configuration
      - JWT_SECRET=4e6118d687bcf565a2677a4bd7cb5c6de8c09bbaec72a9e49d25ef4894cd8be6f3a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0

      # Mail Configuration (Optional - update with your credentials)
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}

      # Blockchain Configuration (Ganache)
      - BLOCKCHAIN_ENABLED=true
      - BLOCKCHAIN_NETWORK=ganache
      - BLOCKCHAIN_RPC_URL=http://ganache:8545
      - BLOCKCHAIN_CHAIN_ID=1337
      - BLOCKCHAIN_CONTRACT_ADDRESS=${BLOCKCHAIN_CONTRACT_ADDRESS:-}
      - BLOCKCHAIN_GAS_LIMIT=6721975
      - BLOCKCHAIN_GAS_PRICE=20000000000
      - GANACHE_PRIVATE_KEY=0x4f3edf983ac636a65a842ce7c78d9aa706d3b113bce9c46f30d7d21715b23b1d

      # QKD Configuration
      - QKD_KEYMANAGER_MOCK_MODE=true
      - QKD_KEYMANAGER_DEFAULT_KEY_SIZE=256
      - QKD_KEYMANAGER_KEY_POOL_SIZE=10
      - QKD_KEYMANAGER_KEY_LIFETIME_SECONDS=3600

      # CORS Configuration
      - CLIENT_URLS=http://localhost:5173,http://localhost:5174,http://localhost:3000,http://localhost:5175

      # Java Options
      - JAVA_OPTS=-Xmx768m -Xms384m
    depends_on:
      postgres:
        condition: service_healthy
      ganache:
        condition: service_healthy
    networks:
      - quantum-mail-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  postgres_data:
    driver: local
  ganache_data:
    driver: local

networks:
  quantum-mail-network:
    driver: bridge

